spring:
  datasource:
    url: jdbc:mysql://db:3306/riskdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    database-platform: org.hibernate.dialect.MySQLDialect

  redis:
    host: redis
    port: 6379

server:
  port: 8080